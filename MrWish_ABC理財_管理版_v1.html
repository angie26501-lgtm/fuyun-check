<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MR. WISH · ABC 理財管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  :root{
    --paper:#f6f1e7; --paper-2:#fbf8f1; --ink:#22312c; --ink-soft:#5c6b62;
    --line:#ddd3c0; --line-soft:#e9e1d1; --green:#1f4a3f; --green-2:#2e6b58;
    --gold:#b0863f; --gold-soft:#d8b878; --pos:#2e6b58; --neg:#b1452f; --warn:#b07d22;
    --A:#185fa5; --B:#ba7517; --C:#0f6e56; --dream:#7a5cae;
    --shadow:0 1px 2px rgba(34,49,44,.06), 0 8px 30px rgba(34,49,44,.07);
  }
  *{box-sizing:border-box;} html,body{margin:0;padding:0;}
  body{background:radial-gradient(1200px 600px at 80% -10%, rgba(176,134,63,.10), transparent 60%),radial-gradient(900px 500px at -10% 110%, rgba(31,74,63,.08), transparent 55%),var(--paper);
    color:var(--ink);font-family:"Noto Sans TC",system-ui,sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;padding:0 0 80px;}
  .wrap{max-width:1180px;margin:0 auto;padding:0 18px;}
  header.top{padding:30px 0 12px;position:relative;}
  .eyebrow{letter-spacing:.42em;font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;margin-bottom:8px;}
  h1{font-family:"Noto Serif TC",serif;font-weight:900;font-size:clamp(24px,4.5vw,40px);line-height:1.02;margin:0;}
  h1 .yr{color:var(--gold);font-style:italic;}
  .who{display:inline-flex;gap:10px;align-items:center;margin-top:8px;font-size:13px;color:var(--ink-soft);}
  .stamp{position:absolute;top:30px;right:0;font-family:"Noto Serif TC",serif;font-weight:700;font-size:12px;color:var(--gold);border:1.5px solid var(--gold-soft);border-radius:4px;padding:6px 12px;letter-spacing:.1em;transform:rotate(4deg);opacity:.85;}
  @media(max-width:640px){.stamp{display:none;}}

  .tabnav{display:flex;gap:3px;border-bottom:2px solid var(--ink);margin-bottom:16px;flex-wrap:wrap;}
  .tabnav button{font-family:"Noto Serif TC",serif;font-weight:700;font-size:15px;border:none;background:none;color:var(--ink-soft);padding:11px 16px;cursor:pointer;border-radius:10px 10px 0 0;transition:.15s;position:relative;top:2px;}
  .tabnav button:hover{color:var(--ink);}
  .tabnav button.on{background:var(--green);color:#f3ede0;}
  .tab{display:none;} .tab.show{display:block;animation:fade .25s;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

  .toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;margin:10px 0 6px;}
  .periodbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .seg{display:inline-flex;background:#ece4d4;border-radius:999px;padding:4px;gap:2px;}
  .seg button{border:none;background:none;font-family:"Noto Sans TC";font-weight:700;font-size:13px;color:var(--ink-soft);padding:7px 13px;border-radius:999px;cursor:pointer;}
  .seg button.on{background:var(--green);color:#f3ede0;}
  .navbtn{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:8px;cursor:pointer;font-size:16px;line-height:1;padding:6px 11px;}
  .navbtn:hover{border-color:var(--gold);color:var(--gold);}
  #periodLabel{font-family:"Noto Serif TC",serif;font-weight:700;font-size:15px;min-width:120px;text-align:center;}
  input[type=date].anchor{font-family:"Noto Sans TC";font-size:12.5px;border:1px solid var(--line);border-radius:8px;padding:5px 8px;background:#fff;color:var(--ink);}
  .btns{display:flex;gap:7px;flex-wrap:wrap;}
  button.act{font-family:"Noto Sans TC";font-weight:700;font-size:12.5px;cursor:pointer;border:1px solid var(--line);background:var(--paper-2);color:var(--ink);padding:7px 12px;border-radius:999px;transition:.15s;}
  button.act:hover{border-color:var(--gold);color:var(--gold);}
  button.act.primary{background:var(--green);color:#f3ede0;border-color:var(--green);}
  #saveStatus{font-size:12px;color:var(--ink-soft);margin:0 0 12px;min-height:16px;}

  .dash{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px;}
  .dash.c3{grid-template-columns:repeat(3,1fr);}
  .card{background:var(--paper-2);border:1px solid var(--line);border-radius:14px;padding:15px 16px 13px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--gold-soft);}
  .card.inc::before{background:var(--green-2);} .card.exp::before{background:var(--neg);} .card.net::before{background:var(--gold);}
  .card.a::before{background:var(--A);} .card.b::before{background:var(--B);} .card.c::before{background:var(--C);}
  .card .lab{font-size:12px;letter-spacing:.1em;color:var(--ink-soft);font-weight:700;}
  .card .big{font-family:"Noto Serif TC",serif;font-weight:900;font-size:clamp(18px,2.8vw,26px);margin-top:6px;font-variant-numeric:tabular-nums;}
  .card .big .cur{font-size:.55em;color:var(--ink-soft);font-weight:700;margin-right:3px;}
  .card .small{font-size:12px;color:var(--ink-soft);margin-top:4px;font-variant-numeric:tabular-nums;}
  .card .big.positive{color:var(--pos);} .card .big.negative{color:var(--neg);}
  @media(max-width:860px){.dash,.dash.c3{grid-template-columns:1fr 1fr;}}
  @media(max-width:520px){.dash,.dash.c3{grid-template-columns:1fr;}}

  .ov{background:var(--paper-2);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:16px 18px;margin-bottom:16px;}
  .ov h3{font-family:"Noto Serif TC",serif;font-size:16px;margin:0 0 12px;font-weight:700;}
  .ov h3 .sub{font-family:"Noto Sans TC";font-size:12px;color:var(--ink-soft);font-weight:400;margin-left:8px;}
  table.lt{width:100%;border-collapse:collapse;}
  .tscroll{overflow-x:auto;}
  table.lt thead th{font-size:11.5px;letter-spacing:.04em;color:var(--ink-soft);font-weight:700;text-align:right;padding:9px 10px;border-bottom:1px solid var(--line-soft);background:#fdfbf6;white-space:nowrap;}
  table.lt thead th.l{text-align:left;}
  table.lt tbody td{padding:7px 10px;border-bottom:1px solid var(--line-soft);font-size:13.5px;vertical-align:middle;font-variant-numeric:tabular-nums;}
  table.lt td.l{text-align:left;} table.lt td.r{text-align:right;}
  table.lt tbody tr:last-child td{border-bottom:none;} table.lt tbody tr:hover{background:#fffdf8;}
  table.lt tfoot td{padding:9px 10px;border-top:2px solid var(--ink);font-weight:700;font-size:13.5px;font-variant-numeric:tabular-nums;text-align:right;}
  table.lt tfoot td.l{text-align:left;}

  input.f, select.f, textarea.f{font-family:"Noto Sans TC";font-size:13px;border:1px solid var(--line);border-radius:8px;padding:7px 9px;background:#fff;color:var(--ink);}
  input.f:focus,select.f:focus,textarea.f:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(176,134,63,.12);}
  input.amt{width:96px;text-align:right;font-variant-numeric:tabular-nums;}
  input.cell{width:90px;text-align:right;border:1px solid transparent;border-radius:7px;padding:5px 7px;background:transparent;font-variant-numeric:tabular-nums;font-family:"Noto Sans TC";font-size:13.5px;color:var(--ink);}
  input.cell:hover{border-color:var(--line);background:#fff;} input.cell:focus{outline:none;border-color:var(--gold);background:#fff;}
  .addform{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px;padding:13px 14px;background:#fff;border:1px solid var(--line);border-radius:12px;}
  .ff{display:flex;flex-direction:column;gap:3px;} .ff label{font-size:11px;color:var(--ink-soft);font-weight:700;}
  .rowdel{border:none;background:none;color:var(--neg);cursor:pointer;font-size:16px;padding:2px 5px;opacity:.45;transition:.12s;}
  .rowdel:hover{opacity:1;}
  .tag{display:inline-block;font-size:10.5px;font-weight:700;border-radius:5px;padding:2px 7px;}
  .tag.A{background:#e6f1fb;color:var(--A);} .tag.B{background:#faeeda;color:var(--B);} .tag.C{background:#e1f5ee;color:var(--C);}
  .tag.in{background:#e1f5ee;color:var(--C);} .tag.out{background:#f5e3dc;color:var(--neg);}
  .pill{display:inline-block;font-size:10.5px;font-weight:700;border-radius:5px;padding:2px 8px;}
  .pill.ok{background:#dce9e2;color:#2e6b58;} .pill.warn{background:#f6e4c2;color:#8a611c;} .pill.bad{background:#f3dcd4;color:#a23a23;}
  .gbar{height:9px;background:#ece4d4;border-radius:5px;overflow:hidden;max-width:240px;}
  .gbar .gfill{height:100%;border-radius:5px;}

  .abcflow{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:14px;}
  .acctbox{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px;}
  @media(max-width:760px){.acctbox{grid-template-columns:1fr;}}
  .acct{border:1px solid var(--line);border-radius:13px;padding:14px 15px;background:var(--paper-2);position:relative;overflow:hidden;}
  .acct::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;}
  .acct.A::before{background:var(--A);} .acct.B::before{background:var(--B);} .acct.C::before{background:var(--C);}
  .acct .at{font-family:"Noto Serif TC";font-weight:700;font-size:16px;} .acct .as{font-size:12px;color:var(--ink-soft);}
  .acct .av{font-family:"Noto Serif TC";font-weight:900;font-size:24px;margin-top:8px;font-variant-numeric:tabular-nums;}
  .acct .arow{display:flex;justify-content:space-between;font-size:12.5px;color:var(--ink-soft);margin-top:5px;font-variant-numeric:tabular-nums;}

  .dreamcard{border:1px solid var(--line);border-radius:12px;padding:13px 15px;background:#fff;margin-bottom:10px;position:relative;overflow:hidden;}
  .dreamcard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--dream);}
  .dreamcard .dn{font-weight:700;font-size:14px;} .dreamcard .dmeta{font-size:12px;color:var(--ink-soft);margin:4px 0 7px;font-variant-numeric:tabular-nums;}

  .meeting{border:1px solid var(--line);border-radius:12px;padding:14px 16px;background:#fff;margin-bottom:11px;}
  .meeting .mh{display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap;}
  .meeting .md{font-family:"Noto Serif TC";font-weight:700;font-size:15px;} .meeting .mt{font-size:12px;color:var(--gold);font-weight:700;}
  .meeting dl{margin:8px 0 0;font-size:13px;} .meeting dt{color:var(--ink-soft);font-weight:700;font-size:11.5px;margin-top:6px;} .meeting dd{margin:1px 0 0;white-space:pre-wrap;}

  .alerts{background:#fbf4e3;border:1px solid var(--gold-soft);border-radius:12px;padding:12px 16px;margin-bottom:16px;font-size:12.5px;color:#7a5a23;}
  .alerts b{color:#5d4316;}

  /* 登入 */
  #gate{position:fixed;inset:0;background:linear-gradient(160deg,#1f4a3f,#143229);display:flex;align-items:center;justify-content:center;z-index:9999;}

  #gate h2{font-family:"Noto Serif TC";font-size:26px;margin:6px 0 4px;}
  #gate p{font-size:12.5px;color:var(--ink-soft);margin:0 0 18px;}

  #gate input:focus{outline:none;border-color:var(--gold);}
  #gate button{width:100%;margin-top:14px;background:var(--green);color:#f3ede0;border:none;border-radius:11px;padding:12px;font-weight:700;font-size:15px;cursor:pointer;font-family:"Noto Serif TC";}
  #gate .err{color:var(--neg);font-size:12.5px;margin-top:10px;min-height:16px;}

  footer.ft{margin-top:34px;text-align:center;color:var(--ink-soft);font-size:12px;border-top:1px solid var(--line);padding-top:16px;}
  @media print{#gate{display:none!important;}.tabnav,.toolbar,.btns,.rowdel,.addform,.stamp,#saveStatus,.navbtn{display:none!important;}.tab{display:block!important;}}

</head>

/* ---------- 共用 ---------- */
function clone(o){ return JSON.parse(JSON.stringify(o)); }
const fmt = n => (Math.round(+n||0)).toLocaleString("en-US");
const parse = v => { const n=parseFloat(String(v).replace(/[, ]/g,"")); return isNaN(n)?0:n; };
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const $ = id => document.getElementById(id);
function startOfDay(d){ const x=new Date(d); x.setHours(0,0,0,0); return x; }
function ymd(d){ const x=new Date(d); return x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0")+"-"+String(x.getDate()).padStart(2,"0"); }
function dObj(s){ const [y,m,dd]=String(s).split("-").map(Number); return startOfDay(new Date(y,(m||1)-1,dd||1)); }
function daysInMonth(y,m){ return new Date(y,m,0).getDate(); }
const PAL=["#2e6b58","#b0863f","#2f6f93","#b05079","#7a8c4f","#9a6a3a","#5a7d8c","#a8772a","#6b8f71","#8a5a86"];

/* ---------- 期間引擎 ---------- */
function range(){
  const a=startOfDay(ANCHOR); let s,e,label;
  if(MODE==="day"){ s=new Date(a); e=new Date(a); label=ymd(a); }
  else if(MODE==="week"){ const dow=(a.getDay()+6)%7; s=new Date(a); s.setDate(a.getDate()-dow); e=new Date(s); e.setDate(s.getDate()+6); label=ymd(s)+" ~ "+ymd(e); }
  else if(MODE==="month"){ s=new Date(a.getFullYear(),a.getMonth(),1); e=new Date(a.getFullYear(),a.getMonth()+1,0); label=a.getFullYear()+" 年 "+(a.getMonth()+1)+" 月"; }
  else if(MODE==="quarter"){ const q=Math.floor(a.getMonth()/3); s=new Date(a.getFullYear(),q*3,1); e=new Date(a.getFullYear(),q*3+3,0); label=a.getFullYear()+" 年 Q"+(q+1); }
  else { const h=a.getMonth()<6?0:1; s=new Date(a.getFullYear(),h*6,1); e=new Date(a.getFullYear(),h*6+6,0); label=a.getFullYear()+" 年 "+(h?"下":"上")+"半年"; }
  e.setHours(23,59,59,999);
  const days=Math.round((startOfDay(e)-s)/86400000)+1;
  return {s,e,days,label};
}
// 各月與期間重疊的天數比例 → 用於補教與一次性的攤提
function monthOverlap(){
  const {s,e}=range(); const out={};
  for(let m=1;m<=12;m++){
    const y=s.getFullYear(); const ms=new Date(y,m-1,1), me=new Date(y,m,0);
    const os=new Date(Math.max(ms,s)), oe=new Date(Math.min(me, startOfDay(e)));
    const ov=Math.max(0, Math.round((startOfDay(oe)-startOfDay(os))/86400000)+1);
    out[m]= ov>0 ? ov/daysInMonth(y,m) : 0;
  }
  return out;
}
const periodMonths = () => range().days/30.44;       // 攤提經常性 m
const periodYears  = () => range().days/365.25;       // 攤提一次性 y

/* ---------- 實際金額（來自日記帳 ＋ 補教） ---------- */
function inRange(dateStr){ const d=dObj(dateStr); const {s,e}=range(); return d>=s && d<=startOfDay(e); }
function tuitionInPeriod(){ const ov=monthOverlap(); let t=0; for(let m=1;m<=12;m++) t+=(+DB.tuition.months[m]||0)*ov[m]; return t; }
function tuitionYearTotal(){ let t=0; for(let m=1;m<=12;m++) t+=(+DB.tuition.months[m]||0); return t; }
function actualIncome(){ let t=DB.ledger.filter(x=>x.kind==="in"&&inRange(x.date)).reduce((s,x)=>s+x.amt,0); if(DB.tuition.auto) t+=tuitionInPeriod(); return t; }
function actualExpense(){ return DB.ledger.filter(x=>x.kind==="out"&&inRange(x.date)).reduce((s,x)=>s+x.amt,0); }
// 期間預算（攤提）
function budgetIncomePeriod(){ return DB.budget.income.reduce((s,it)=>s+(it.m*periodMonths())+(it.y*periodYears()),0) + (DB.tuition.auto?tuitionInPeriod():0); }
function budgetExpensePeriod(){ return DB.budget.expense.reduce((s,it)=>s+(it.m*periodMonths())+(it.y*periodYears()),0); }
// 帳戶餘額（期初 + 全期日記帳）
function acctBalance(a){ const o=+DB.open[a]||0; const flow=DB.ledger.filter(x=>x.acct===a).reduce((s,x)=>s+(x.kind==="in"?x.amt:-x.amt),0); return o+flow; }
function acctFlow(a){ const inn=DB.ledger.filter(x=>x.acct===a&&x.kind==="in"&&inRange(x.date)).reduce((s,x)=>s+x.amt,0); const out=DB.ledger.filter(x=>x.acct===a&&x.kind==="out"&&inRange(x.date)).reduce((s,x)=>s+x.amt,0); return {inn,out}; }

/* ---------- 資產／負債／淨值 ---------- */
const totalAsset = () => DB.assets.reduce((s,a)=>s+(+a.amt||0),0);
function loanBalance(){ const h=DB.loan.hist; return h.length? (+h[h.length-1].bal||0) : 0; }
const totalLiab = () => loanBalance() + DB.otherLiab.reduce((s,x)=>s+(+x.amt||0),0);
const netWorth = () => totalAsset()-totalLiab();

/* ---------- 環圈圖 ---------- */
function donut(data, top, bot, size){
  size=size||150; const R=Math.round(size*0.42), sw=Math.round(size*0.14), C=2*Math.PI*R, cx=size/2, cy=size/2;
  const items=data.filter(d=>d.val>0); const tot=items.reduce((s,d)=>s+d.val,0);
  if(tot<=0) return `<svg width="${size}" height="${size}"><circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="#ece4d4" stroke-width="${sw}"/></svg>`;
  let off=0, segs="";
  items.forEach((d,i)=>{ const len=d.val/tot*C; segs+=`<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${d.color||PAL[i%PAL.length]}" stroke-width="${sw}" stroke-dasharray="${len.toFixed(2)} ${(C-len).toFixed(2)}" stroke-dashoffset="${(-off).toFixed(2)}" transform="rotate(-90 ${cx} ${cy})"/>`; off+=len; });
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${segs}<text x="${cx}" y="${cy-2}" text-anchor="middle" font-size="12" fill="#5c6b62" font-family="Noto Serif TC">${top||""}</text><text x="${cx}" y="${cy+15}" text-anchor="middle" font-size="14" font-weight="900" fill="#22312c" font-family="Noto Serif TC">${bot||""}</text></svg>`;
}
function legend(data){ const tot=data.reduce((s,d)=>s+d.val,0)||1; return `<div style="display:flex;flex-direction:column;gap:5px;margin-top:8px">`+data.filter(d=>d.val>0).map((d,i)=>`<div style="display:flex;align-items:center;gap:8px;font-size:12.5px"><span style="width:10px;height:10px;border-radius:3px;background:${d.color||PAL[i%PAL.length]}"></span><span style="flex:1">${d.name}</span><span style="color:var(--ink-soft);font-variant-numeric:tabular-nums">${fmt(d.val)}</span><span style="font-weight:700;min-width:46px;text-align:right;font-variant-numeric:tabular-nums">${(d.val/tot*100).toFixed(1)}%</span></div>`).join("")+`</div>`; }

/* ---- 收支結算（達標／超標） ---- */
function settleRows(kind){
  const items=DB.budget[kind];
  const cats=[]; items.forEach(it=>{ if(!cats.includes(it.cat)) cats.push(it.cat); });
  const actCat={}; DB.ledger.filter(x=>x.kind===(kind==="income"?"in":"out")&&inRange(x.date)).forEach(x=>{ actCat[x.cat]=(actCat[x.cat]||0)+x.amt; });
  if(kind==="income"&&DB.tuition.auto) actCat["補教收入"]=(actCat["補教收入"]||0)+tuitionInPeriod();
  return cats.map(c=>{ const its=items.filter(it=>it.cat===c); const bud=its.reduce((s,it)=>s+(it.m*periodMonths()+it.y*periodYears()),0)+((kind==="income"&&c==="補教收入"&&DB.tuition.auto)?tuitionInPeriod():0); const act=actCat[c]||0; const pct=bud>0?act/bud*100:0; return {cat:c,its,bud,act,pct}; });
}
function statusOf(pct,kind){ if(kind==="income"){ return pct>=100?["ok","達標"]:pct>=80?["warn","接近"]:["bad","未達"]; } return pct<=100?["ok","達標"]:pct<=110?["warn","略超"]:["bad","超標"]; }
function settleTable(kind,title){
  const rows=settleRows(kind); const tb=rows.flatMap(r=>{
    const [st,lab]=statusOf(r.pct,kind); const fc=st==="bad"?"var(--neg)":st==="warn"?"var(--warn)":"var(--green-2)";
    const head=`<tr style="background:#fdfbf6"><td class="l" style="font-weight:700">${r.cat}</td><td>${fmt(r.bud)}</td><td>${fmt(r.act)}</td><td><div style="display:flex;align-items:center;gap:8px;justify-content:flex-end"><div class="gbar" style="width:90px"><div class="gfill" style="width:${Math.min(r.pct,100).toFixed(0)}%;background:${fc}"></div></div><b>${r.pct.toFixed(0)}%</b> <span class="pill ${st}">${lab}</span></div></td></tr>`;
    const subs=r.its.map(it=>`<tr><td class="l" style="padding-left:22px;color:var(--ink-soft)">${it.n}${it.note?` <span style="font-size:11px">${it.note}</span>`:""}</td><td style="color:var(--ink-soft)">${fmt(it.m*periodMonths()+it.y*periodYears())}</td><td colspan="2"></td></tr>`).join("");
    return [head,subs].join("");
  }).join("");
  const tBud=rows.reduce((s,r)=>s+r.bud,0), tAct=rows.reduce((s,r)=>s+r.act,0);
  return `<div class="ov"><h3>${title} <span class="sub">${range().label} · 本期預算 vs 實際</span></h3>
    <div class="tscroll"><table class="lt"><thead><tr><th class="l">分類 / 項目</th><th>本期預算</th><th>本期實際</th><th>達成率 · 燈號</th></tr></thead>
    <tbody>${tb||`<tr><td class="l" colspan="4" style="color:var(--ink-soft)">無資料</td></tr>`}</tbody>
    <tfoot><tr><td class="l">合計</td><td>${fmt(tBud)}</td><td>${fmt(tAct)}</td><td style="text-align:right">${tBud>0?(tAct/tBud*100).toFixed(0):0}%</td></tr></tfoot></table></div></div>`;
}
function renderSettle(){
  const expRows=settleRows("expense");
  const dd=expRows.map((r,i)=>({name:r.cat,val:r.bud,color:PAL[i%PAL.length]})).filter(d=>d.val>0).sort((a,b)=>b.val-a.val);
  $("tab-settle").innerHTML=`
    <div class="alerts"><b>說明：</b>「實際」取自日記帳（補教收入自動帶入）；「預算」依期間天數攤提。<b>支出</b>看是否超標、<b>收入</b>看是否達標。</div>
    ${settleTable("income","收入結算")}

    <div class="ov"><h3>支出預算結構 <span class="sub">本期</span></h3>
      <div style="display:flex;gap:20px;align-items:center;flex-wrap:wrap"><div>${donut(dd,"本期支出",fmt(expRows.reduce((s,r)=>s+r.bud,0)),170)}</div><div style="flex:1;min-width:220px">${legend(dd)}</div></div></div>`;
}

}

      <div class="ff"><label>重點摘要</label><textarea class="f" id="mSum" rows="2" placeholder="客戶關注、討論重點…"></textarea></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <div class="ff" style="flex:1;min-width:200px"><label>決議事項</label><textarea class="f" id="mDec" rows="2"></textarea></div>
        <div class="ff" style="flex:1;min-width:200px"><label>待辦 / 追蹤</label><textarea class="f" id="mTodo" rows="2"></textarea></div>
        <div class="ff"><label>下次追蹤日</label><input class="f" type="date" id="mNext"></div>
      </div>
      <button class="act primary" onclick="addMeeting()" style="align-self:flex-start">＋ 新增訪談記錄</button>
    </div>
    ${ms.length?ms.map(m=>`<div class="meeting"><div class="mh"><span class="md">${m.date} · ${m.topic||"（未命名）"}</span><span class="mt">${m.type}${m.next?` · 下次 ${m.next}`:""} <button class="rowdel" onclick="delMeeting('${m.id}')">×</button></span></div>
      <dl>${m.sum?`<dt>重點摘要</dt><dd>${m.sum}</dd>`:""}${m.dec?`<dt>決議事項</dt><dd>${m.dec}</dd>`:""}${m.todo?`<dt>待辦 / 追蹤</dt><dd>${m.todo}</dd>`:""}</dl></div>`).join("")
      :`<div class="ov" style="color:var(--ink-soft)">尚無訪談記錄。</div>`}`;
}
function addMeeting(){ DB.meetings.push({id:uid(),date:$("mDate").value||ymd(new Date()),type:$("mType").value,topic:$("mTopic").value.trim(),sum:$("mSum").value.trim(),dec:$("mDec").value.trim(),todo:$("mTodo").value.trim(),next:$("mNext").value}); save(); render(); flash("已新增訪談記錄 ✓"); }
function delMeeting(id){ DB.meetings=DB.meetings.filter(m=>m.id!==id); save(); render(); }

/* ---- 財富花園 ---- */
function renderGarden(){
  const goals=DB.goals; const W=720,H=300, gy=H-46, n=goals.length, gap=W/(n+1);
  const sky=`<defs><linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#dff0e6"/><stop offset="1" stop-color="#f6f1e7"/></linearGradient></defs>`;
  const sun=`<circle cx="${W-60}" cy="52" r="26" fill="#f2c75a"/><circle cx="${W-60}" cy="52" r="34" fill="#f2c75a" opacity="0.18"/>`;
  const ground=`<rect x="0" y="${gy}" width="${W}" height="${H-gy}" fill="#cdb98a" opacity=".5"/><line x1="0" y1="${gy}" x2="${W}" y2="${gy}" stroke="#a98f5e" stroke-width="2"/>`;
  const plants=goals.map((g,i)=>{
    const pct=g.target>0?Math.min(g.cur/g.target,1):0; const x=gap*(i+1);
    const h=24+pct*150; const top=gy-h;
    const stem=`<line x1="${x}" y1="${gy}" x2="${x}" y2="${top}" stroke="#3f7d4f" stroke-width="4"/>`;
    const leaves=pct>0.2?`<ellipse cx="${x-14}" cy="${top+h*0.5}" rx="16" ry="7" fill="#5aa06a" transform="rotate(-28 ${x-14} ${top+h*0.5})"/><ellipse cx="${x+14}" cy="${top+h*0.35}" rx="16" ry="7" fill="#5aa06a" transform="rotate(28 ${x+14} ${top+h*0.35})"/>`:"";
    const bloomR=8+pct*16; const bloom = pct>=1
      ? `<g>${[0,60,120,180,240,300].map(a=>`<circle cx="${x+Math.cos(a*Math.PI/180)*bloomR*0.7}" cy="${top+Math.sin(a*Math.PI/180)*bloomR*0.7}" r="${bloomR*0.6}" fill="#e7a6c4"/>`).join("")}<circle cx="${x}" cy="${top}" r="${bloomR*0.6}" fill="#f2c75a"/></g>`
      : `<circle cx="${x}" cy="${top}" r="${bloomR}" fill="${pct>0.6?'#7bbf86':'#a9cf9c'}"/>`;
    const lab=`<text x="${x}" y="${gy+18}" text-anchor="middle" font-size="11" fill="#3a4a40" font-weight="700">${g.name.length>7?g.name.slice(0,7)+"…":g.name}</text><text x="${x}" y="${gy+32}" text-anchor="middle" font-size="10" fill="#5c6b62">${(pct*100).toFixed(0)}%</text>`;
    return stem+leaves+bloom+lab;
  }).join("");
  $("tab-garden").innerHTML=`
    <div class="ov"><h3>財富花園 · 財務目標藍圖 <span class="sub">每株植物＝一個目標，灌溉進度＝達成率（滿開＝達標）</span></h3>
      <svg width="100%" viewBox="0 0 ${W} ${H}" style="display:block">${sky}<rect x="0" y="0" width="${W}" height="${gy}" fill="url(#sky)"/>${sun}${ground}${plants}</svg>
      <div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:6px;font-size:11px;color:var(--ink-soft)">里程碑：${[65,70,75,80].map(a=>`<span style="background:#ece4d4;border-radius:999px;padding:3px 12px">${a} 歲</span>`).join("")}</div></div>
    <div class="ov"><h3>目標設定 <span class="sub">可編輯，花園即時生長</span></h3>
      <div class="tscroll"><table class="lt"><thead><tr><th class="l">目標</th><th>目前</th><th>目標值</th><th>達成率</th><th></th></tr></thead>
      <tbody>${goals.map((g,i)=>{ const pct=g.target>0?Math.min(g.cur/g.target*100,100):0; return `<tr><td class="l"><input class="cell" style="width:160px;text-align:left" value="${g.name}" onchange="DB.goals[${i}].name=this.value;save();render()"></td><td class="r"><input class="cell" value="${g.cur}" onchange="DB.goals[${i}].cur=parse(this.value);save();render()"></td><td class="r"><input class="cell" value="${g.target}" onchange="DB.goals[${i}].target=parse(this.value);save();render()"></td><td>${pct.toFixed(0)}%</td><td><button class="rowdel" onclick="delGoal(${i})">×</button></td></tr>`;}).join("")}</tbody></table></div>
      <button class="act" onclick="addGoal()" style="margin-top:8px">＋ 新增目標</button></div>`;
}
function addGoal(){ DB.goals.push({name:"新目標",target:0,cur:0}); save(); render(); }
function delGoal(i){ DB.goals.splice(i,1); save(); render(); }

/* ---- 風險規劃（賓士圖） ---- */
function renderRisk(){
  const P=DB.risk.pillars, tot=P.reduce((s,p)=>s+(+p.val||0),0)||1;
  const cx=170,cy=170,R=120; // 三等分（賓士），自頂端起每 120°
  const segs=P.map((p,i)=>{ const a0=-90+i*120, a1=-90+(i+1)*120; const r0=a0*Math.PI/180,r1=a1*Math.PI/180;
    const x0=cx+R*Math.cos(r0), y0=cy+R*Math.sin(r0), x1=cx+R*Math.cos(r1), y1=cy+R*Math.sin(r1);
    const path=`M${cx} ${cy} L${x0.toFixed(1)} ${y0.toFixed(1)} A${R} ${R} 0 0 1 ${x1.toFixed(1)} ${y1.toFixed(1)} Z`;
    const am=(a0+a1)/2*Math.PI/180, lx=cx+R*0.62*Math.cos(am), ly=cy+R*0.62*Math.sin(am);
    return `<path d="${path}" fill="${p.color}" opacity="0.9" stroke="#fff" stroke-width="3"/><text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">${(p.val/tot*100).toFixed(0)}%</text>`;
  }).join("");
  $("tab-risk").innerHTML=`
    <div class="alerts"><b>賓士圖架構：</b>完整理財以三大支柱平衡——風險移轉（保障）／財務目標（儲蓄）／資產增值（投資）。下方金額可編輯，圖形即時更新。</div>
    <div class="ov"><h3>風險規劃配置 <span class="sub">三大支柱 · 合計 ${fmt(tot)}</span></h3>
      <div style="display:flex;gap:26px;align-items:center;flex-wrap:wrap">
        <svg width="340" height="340" viewBox="0 0 340 340" style="max-width:100%"><circle cx="${cx}" cy="${cy}" r="${R+10}" fill="none" stroke="#ddd3c0" stroke-width="2"/>${segs}<circle cx="${cx}" cy="${cy}" r="34" fill="#fbf8f1" stroke="#ddd3c0"/><text x="${cx}" y="${cy-3}" text-anchor="middle" font-size="11" fill="#5c6b62" font-family="Noto Serif TC">平衡</text><text x="${cx}" y="${cy+13}" text-anchor="middle" font-size="11" fill="#5c6b62" font-family="Noto Serif TC">配置</text></svg>
        <div style="flex:1;min-width:260px">
          ${P.map((p,i)=>`<div class="dreamcard" style="margin-bottom:9px"><div class="dreamcard" style="border:none;padding:0"></div>
            <div style="display:flex;align-items:center;gap:8px"><span style="width:12px;height:12px;border-radius:3px;background:${p.color}"></span><b>${p.name}</b><span style="margin-left:auto;font-weight:700;font-variant-numeric:tabular-nums">${(p.val/tot*100).toFixed(0)}%</span></div>
            <div style="font-size:12px;color:var(--ink-soft);margin:3px 0 7px">${p.note}</div>
            <input class="f amt" style="width:140px" value="${p.val}" onchange="DB.risk.pillars[${i}].val=parse(this.value);save();render()"> 元</div>`).join("")}
        </div>
      </div></div>`;
}

/* ============================================================
   分頁 / 期間 / 儲存
   ============================================================ */
function setTab(t){ TAB=t; document.querySelectorAll(".tab").forEach(s=>s.classList.remove("show")); $("tab-"+t).classList.add("show"); document.querySelectorAll(".tabnav button").forEach(b=>b.classList.toggle("on",b.dataset.t===t)); $("periodbar").style.visibility=(t==="meetings"||t==="garden"||t==="risk"||t==="tuition"||t==="budget")?"hidden":"visible"; render(); }
function setMode(m){ MODE=m; document.querySelectorAll(".seg button").forEach(b=>b.classList.toggle("on",b.dataset.m===m)); render(); }
function setAnchor(v){ if(v) ANCHOR=dObj(v); render(); }
function stepPeriod(d){ const a=new Date(ANCHOR); if(MODE==="day")a.setDate(a.getDate()+d); else if(MODE==="week")a.setDate(a.getDate()+7*d); else if(MODE==="month")a.setMonth(a.getMonth()+d); else if(MODE==="quarter")a.setMonth(a.getMonth()+3*d); else a.setMonth(a.getMonth()+6*d); ANCHOR=startOfDay(a); render(); }

let _t=null;
function flash(t){ $("saveStatus").textContent=t; }
function save(){ if(_t)clearTimeout(_t); _t=setTimeout(()=>{ try{ localStorage.setItem(KEY,JSON.stringify(DB)); const d=new Date(); flash(`已自動儲存 ✓（${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}）`);}catch(e){ flash("⚠ 此環境無法自動儲存，請用「備份」保存（部署到 GitHub Pages 後即可自動存）。"); } },400); }
function load(){ try{ const r=localStorage.getItem(KEY); if(r){ const d=JSON.parse(r); DB=Object.assign(clone(DEFAULT_DB),d); return true; } }catch(e){} return false; }
function backup(){ const b=new Blob([JSON.stringify(DB,null,2)],{type:"application/json"}); const a=document.createElement("a"); a.href=URL.createObjectURL(b); a.download="MrWish_理財備份_"+ymd(new Date())+".json"; a.click(); URL.revokeObjectURL(a.href); flash("已下載備份 ✓"); }
function restore(ev){ const f=ev.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{ try{ DB=Object.assign(clone(DEFAULT_DB),JSON.parse(r.result)); save(); render(); flash("已還原備份 ✓"); }catch(e){ alert("備份檔讀取失敗"); } }; r.readAsText(f); ev.target.value=""; }
function exportCSV(){
  const esc=v=>`"${String(v??"").replace(/"/g,'""')}"`; let lines=[];
  if(TAB==="journal"||TAB==="ov"||TAB==="settle"){ lines=[["日期","收/支","帳戶","類別","項目","金額"].map(esc).join(",")]; DB.ledger.filter(x=>inRange(x.date)).forEach(x=>lines.push([x.date,x.kind==="in"?"收入":"支出",x.acct,x.cat,x.item||"",x.amt].map(esc).join(","))); }
  else if(TAB==="tuition"){ lines=[["月份","補教收費"].map(esc).join(",")]; for(let m=1;m<=12;m++)lines.push([m+"月",DB.tuition.months[m]||0].map(esc).join(",")); }
  else if(TAB==="networth"){ lines=[["類型","項目","備註","目前金額"].map(esc).join(",")]; DB.assets.forEach(a=>lines.push(["資產",a.n,a.note||"",a.amt||0].map(esc).join(","))); lines.push(["負債","房貸","本金餘額",loanBalance()].map(esc).join(",")); }
  else if(TAB==="meetings"){ lines=[["日期","類型","主題","重點","決議","待辦","下次"].map(esc).join(",")]; DB.meetings.forEach(m=>lines.push([m.date,m.type,m.topic,m.sum,m.dec,m.todo,m.next].map(esc).join(","))); }
  else if(TAB==="budget"){ lines=[["類型","項目","帳戶","類別","每月","一次性(年)","年合計"].map(esc).join(",")]; DB.budget.income.forEach(it=>lines.push(["收入",it.n,it.acct,it.cat,it.m,it.y,annualOf(it)].map(esc).join(","))); DB.budget.expense.forEach(it=>lines.push(["支出",it.n,it.acct,it.cat,it.m,it.y,annualOf(it)].map(esc).join(","))); }
  else { lines=[["項目","值"].map(esc).join(",")]; }
  const b=new Blob(["\uFEFF"+lines.join("\r\n")],{type:"text/csv;charset=utf-8"}); const a=document.createElement("a"); a.href=URL.createObjectURL(b); a.download="MrWish_"+TAB+"_"+ymd(new Date())+".csv"; a.click(); URL.revokeObjectURL(a.href); flash("已匯出 CSV ✓");
}

/* ---- 登入 ---- */
function tryLogin(){ if($("pwd").value===PWD){ sessionStorage.setItem("wish_ok","1"); $("gate").style.display="none"; $("app").style.display="block"; boot(); } else { $("pwdErr").textContent="密碼錯誤，請再試一次。"; $("pwd").value=""; } }
$("pwd").addEventListener("keydown",e=>{ if(e.key==="Enter")tryLogin(); });
if(sessionStorage.getItem("wish_ok")==="1"){ $("gate").style.display="none"; $("app").style.display="block"; }

function boot(){ load(); setTab("ov"); save(); }
if(sessionStorage.getItem("wish_ok")==="1") boot(); else setTimeout(()=>$("pwd").focus(),100);
</script>
