<html lang="zh-Hant">
<head>

<title>薪資（佣金）統計</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@600;700;900&display=swap" rel="stylesheet">
<style>
  :root{--paper:#faf6ec;--paper2:#f3ecdc;--ink:#2c2620;--ink-soft:#6b6055;--line:#e2d8c4;--line2:#d2c5ab;
    --gold:#a8772a;--gold-soft:#f0e3c8;--green:#4a7c59;--green-soft:#e3efe5;--red:#b04a3c;
    --prop:#2f6f8f;--prop-soft:#dceaf0;--life:#9d6b3f;--life-soft:#f0e5d6;
    --shadow:0 1px 3px rgba(60,45,20,.08),0 8px 24px rgba(60,45,20,.06);}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans TC',sans-serif;background:var(--paper);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh;
    background-image:radial-gradient(circle at 18% 8%,rgba(168,119,42,.045),transparent 42%),radial-gradient(circle at 92% 95%,rgba(74,124,89,.04),transparent 42%);}
  .wrap{max-width:1280px;margin:0 auto;padding:26px 18px 70px}
  header .kicker{font-size:12px;letter-spacing:.28em;color:var(--gold);font-weight:700}
  h1{font-family:'Noto Serif TC',serif;font-weight:900;font-size:31px;margin:2px 0}
  .sub{color:var(--ink-soft);font-size:13.5px}.sub b{color:var(--ink)}
  .toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:16px 0 10px}
  .searchbox{position:relative;flex:1;min-width:220px;max-width:360px}
  .searchbox svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);opacity:.45}
  #search{width:100%;font-size:14px;border:1px solid var(--line2);border-radius:10px;padding:10px 30px 10px 34px;background:#fff;color:var(--ink)}
  #search:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-soft)}
  .clearx{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:none;background:none;cursor:pointer;font-size:18px;color:var(--ink-soft);display:none;padding:2px 6px;line-height:1}
  .btn{font-size:13px;font-weight:600;border:1px solid var(--line2);background:#fff;color:var(--ink);border-radius:9px;padding:9px 13px;cursor:pointer;transition:.15s;font-family:inherit}
  .btn:hover{background:var(--paper2);border-color:var(--gold)}
  .seg{display:inline-flex;border:1px solid var(--line2);border-radius:9px;overflow:hidden;background:#fff}
  .seg button{border:none;background:none;font-size:12.5px;font-weight:600;padding:9px 12px;cursor:pointer;color:var(--ink-soft);font-family:inherit}
  .seg button.on{background:var(--ink);color:var(--paper)}
  .spacer{flex:1}
  select.flt{font-size:12.5px;font-weight:600;border:1px solid var(--line2);border-radius:9px;padding:9px 10px;background:#fff;color:var(--ink);cursor:pointer;font-family:inherit}
  .hero{background:linear-gradient(135deg,#fff,#fbf4e6);border:1px solid var(--line2);border-radius:18px;box-shadow:var(--shadow);padding:20px 22px;margin:16px 0 16px;position:relative;overflow:hidden}
  .hero::before{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(168,119,42,.10),transparent 70%)}
  .hero .htop{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px}
  .hero .hlab{font-size:13px;color:var(--ink-soft);font-weight:600;letter-spacing:.05em}
  .hero .hmonth{font-family:'Noto Serif TC';font-weight:700;font-size:15px;color:var(--gold)}
  .hero select{font-family:inherit;font-size:14px;font-weight:700;border:1px solid var(--line2);border-radius:10px;padding:8px 12px;background:#fff;color:var(--ink);cursor:pointer}
  .hero .big{font-family:'Noto Serif TC',serif;font-weight:900;font-size:42px;letter-spacing:.01em;margin:6px 0 2px;line-height:1.1}
  .hero .big.neg{color:var(--red)}
  .hero .meta{font-size:12.5px;color:var(--ink-soft)}
  .hero .split{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
  .hero .chip2{flex:1;min-width:150px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px 14px}
  .hero .chip2 .t{font-size:11.5px;color:var(--ink-soft);font-weight:600;display:flex;align-items:center;gap:5px}
  .hero .chip2 .v{font-family:'Noto Serif TC';font-weight:900;font-size:20px;margin-top:2px}
  .hero .chip2.p .v{color:var(--prop)}.hero .chip2.l .v{color:var(--life)}
  .hero .slip{margin-top:12px;border-top:1px dashed var(--line2);padding-top:10px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .hero .slip .s{font-size:11.5px;color:var(--ink-soft)}
  .hero .slip .s b{display:block;font-family:'Noto Sans TC';font-weight:700;font-size:15px;color:var(--ink);font-variant-numeric:tabular-nums;margin-top:1px}
  @media(max-width:680px){.hero .big{font-size:34px}.hero .slip{grid-template-columns:repeat(2,1fr)}}
  .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:14px 0 20px}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--gold)}
  .card.g::before{background:var(--green)}.card.b::before{background:var(--prop)}.card.o::before{background:var(--life)}
  .card .lab{font-size:12px;color:var(--ink-soft);font-weight:600}
  .card .val{font-family:'Noto Serif TC',serif;font-weight:900;font-size:22px;margin-top:3px}
  .card .hint{font-size:11.5px;color:var(--ink-soft);margin-top:2px}
  .panel{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px}
  .panel h3{font-family:'Noto Serif TC',serif;font-size:16px;font-weight:700;padding:14px 18px 4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .panel .ph-sub{padding:0 18px 10px;font-size:12px;color:var(--ink-soft)}
  .filtertag{font-size:11.5px;font-weight:600;color:var(--gold);background:var(--gold-soft);padding:2px 9px;border-radius:20px}
  .tscroll{overflow-x:auto}
  table{border-collapse:collapse;width:100%;font-size:12.5px}
  thead th{background:var(--paper2);color:var(--ink-soft);font-weight:700;font-size:11.5px;padding:9px 9px;text-align:right;white-space:nowrap;border-bottom:1px solid var(--line2);position:sticky;top:0}
  thead th.l{text-align:left}
  tbody td{padding:7px 9px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap;font-variant-numeric:tabular-nums}
  tbody td.l{text-align:left}
  tbody tr:hover td{background:var(--paper)}
  .net{font-weight:700;color:var(--gold)}.pos{color:var(--prop)}.lif{color:var(--life)}.yr{color:#7a5cae}
  .miss{color:var(--ink-soft);font-style:italic}
  tfoot td{background:var(--ink);color:var(--paper);padding:9px 9px;text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
  tfoot td.l{text-align:left;font-family:'Noto Serif TC'}
  tfoot tr.avg td{background:#473f34}
  .badge{display:inline-block;font-size:10.5px;font-weight:600;padding:1px 7px;border-radius:20px;background:var(--paper2);color:var(--ink-soft);border:1px solid var(--line)}
  .tp{font-size:10.5px;font-weight:700;padding:1px 7px;border-radius:20px}
  .tp.p{background:var(--prop-soft);color:var(--prop)}.tp.l{background:var(--life-soft);color:var(--life)}.tp.y{background:#ece5f5;color:#7a5cae}
  .hl{background:#fff2b8;border-radius:3px;padding:0 1px}
  .empty{padding:34px;text-align:center;color:var(--ink-soft)}
  .grp td{background:var(--green-soft);font-weight:700;border-top:1px solid var(--line2)}
  .grp .gtot{color:var(--green)}
  footer{text-align:center;color:var(--ink-soft);font-size:12px;margin-top:18px}
  @media(max-width:680px){.cards{grid-template-columns:repeat(2,1fr)}h1{font-size:25px}}
  @media print{.toolbar,.clearx{display:none!important}body{background:#fff}.panel,.card{box-shadow:none}}
</style></head>
<body><div class="wrap">
  <header><div class="kicker">公勝保險 · 產險＋壽險佣金統計</div>
    <h1>薪資（佣金）統計表</h1>
    <div class="sub">姓名：<b id="agentName"></b> · <b id="periodCount"></b> 個月 · 每月本期實領＝產險＋壽險 · 明細可按產／壽險與客戶查詢</div></header>
  <div class="toolbar">
    <div class="searchbox"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6b6055" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
      <input id="search" type="text" placeholder="搜尋客戶／保險公司／保單號／險種…" oninput="onSearch()">
      <button class="clearx" id="clearx" onclick="clearSearch()">&times;</button></div>
    <span class="spacer"></span>
    <span style="font-size:12.5px;color:var(--ink-soft);font-weight:700">期間</span>
    <select class="flt" id="fmStart" onchange="render()"></select>
    <span style="color:var(--ink-soft);font-weight:700">～</span>
    <select class="flt" id="fmEnd" onchange="render()"></select>
    <div class="seg" id="typeSeg"><button class="on" data-t="" onclick="setType('')">全部</button><button data-t="產險" onclick="setType('產險')">產險</button><button data-t="壽險" onclick="setType('壽險')">壽險</button><button data-t="年終" onclick="setType('年終')">年終</button></div>
    <select class="flt" id="fcat" onchange="render()"></select>
    <div class="seg" id="viewSeg"><button class="on" data-v="list" onclick="setView('list')">明細</button><button data-v="group" onclick="setView('group')">依客戶彙總</button></div>
    <div class="seg" id="maskSeg"><button class="on" data-m="full" onclick="setMask('full')">姓名全顯</button><button data-m="mask" onclick="setMask('mask')">遮一字</button></div>
    <button class="btn" onclick="exportCSV()">匯出 CSV</button><button class="btn" onclick="window.print()">列印</button>
  </div>
  <div class="hero" id="hero"></div>
  <div class="cards" id="cards"></div>
  <div class="panel"><h3>逐月本期實領（產險＋壽險）</h3>
    <div class="ph-sub">每月合計＝產險本期實領＋壽險本期實領。標「—」表示該月該類報表尚未提供。最後兩列為累計與月平均。</div>
    <div class="tscroll"><table id="sumtbl"></table></div></div>
  <div class="panel"><h3>佣金發放明細查詢 <span class="filtertag" id="ftag" style="display:none"></span></h3>
    <div class="ph-sub">每筆顯示計算：代理費（或獎勵金／分潤）× 費率% ＝ 佣金。輸入客戶姓名可查該客戶名下所有保單。</div>
    <div class="tscroll"><table id="dettbl"></table></div></div>
  <footer>資料來源：公勝保險經紀人 產險佣金報表＋壽險佣金報表 · 各月分類佣金加總均與報表核對一致</footer>
</div>
